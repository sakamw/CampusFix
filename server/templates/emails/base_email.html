<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusFix Notification</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4;">
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #f4f4f4;">
        <tr>
            <td align="center" style="padding: 20px 0;">
                <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    <!-- Header -->
                    <tr>
                        <td style="padding: 20px; text-align: center; border-bottom: 4px solid #1a73e8;">
                            <h1 style="margin: 0; color: #1a73e8; font-size: 24px; font-weight: bold;">CampusFix</h1>
                        </td>
                    </tr>
                    <!-- Content -->
                    <tr>
                        <td style="padding: 40px 30px; line-height: 1.6; color: #333333;">
                            {% block content %}
                            {% endblock %}
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="padding: 20px 30px; background-color: #f9f9f9; text-align: center; font-size: 12px; color: #777777; border-top: 1px solid #eeeeee;">
                            <p style="margin: 0 0 10px 0;">&copy; {% now "Y" %} CampusFix &mdash; Technical University of Kenya</p>
                            <p style="margin: 0 0 10px 0;">This is an automated email, please do not reply.</p>
                            {% if show_preferences %}
                            <p style="margin: 0;">
                                <a href="{{ SITE_URL }}/profile/settings" style="color: #1a73e8; text-decoration: none;">Manage email preferences</a>
                            </p>
                            {% endif %}
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
